name: dudect
on:
  push:
    branches:
      - master 
  schedule:
    - cron: '0 0 * * 0' # Midnight of each sunday

permissions:
  contents: read

# We don't need to run older workflows for the same PR's, since we always want the output of the newest ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Weekly dudect-bencher tests
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      
      - name: Install toolchain
        run: rustup toolchain install stable
        shell: bash
      
      - name: -C opt-level = 1
        run: sh run_benches_release.sh opt-level=1

      - name: -C opt-level = 2
        run: sh run_benches_release.sh opt-level=2

      - name: -C opt-level = 3
        run: sh run_benches_release.sh opt-level=3